name: Data Sync to Qlik

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    # Adicionando o diretório padrão para todos os comandos 'run'
    defaults:
      run:
        working-directory: ./matomo-analytics-dashboard

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          # Importante: O checkout precisa ser na raiz para pegar as subpastas
          path: "."

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.9"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run ETL Export
        env:
          MATOMO_TOKEN: ${{ secrets.MATOMO_TOKEN }}
          MATOMO_URL: ${{ secrets.MATOMO_URL }}
          MATOMO_SITE_ID: ${{ secrets.MATOMO_SITE_ID }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          GOOGLE_PROPERTY_ID: ${{ secrets.GOOGLE_PROPERTY_ID }}
        run: python run_export.py

      - name: Commit and Push Changes
        # O commit precisa ser feito na raiz do repo, então sobrescrevemos o working-directory aqui
        working-directory: .
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add matomo-analytics-dashboard/exports/*.csv
          git commit -m "📊 Auto-update data for Qlik [skip ci]" || echo "No changes to commit"
          git push
